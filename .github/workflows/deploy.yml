name: deploy

on:
    repository_dispatch:
        types: [ trigger-deploy ]
    workflow_dispatch:
        inputs:
            environment:
                required: true
                type: choice
                options: [ development, staging ]
            service:
                required: true
                type: choice
                options: [ frontend, backend ]

env:
    ENVIRONMENT: >-
        ${{ github.event_name == 'workflow_dispatch' &&
        github.event.inputs.environment ||  (github.event.client_payload.ref ==
        'main' && 'staging' || 'development') }}
    SERVICE: ${{ github.event.inputs.service || github.event.client_payload.service }}

concurrency:
    group: deploy-${{ github.event_name == 'workflow_dispatch' &&
        github.event.inputs.environment || (github.event.client_payload.ref ==
        'main' && 'staging' || 'development') }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    terraform-check:
        runs-on: ubuntu-latest
        environment: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            github.event.inputs.environment ||  (github.event.client_payload.ref
            == 'main' && 'staging' || 'development') }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: IaC Security Scan
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  severity: "CRITICAL"
                  exit-code: 1
                  scan-ref: "terraform/environments/${{ env.ENVIRONMENT }}"

    deploy:
        needs: terraform-check
        runs-on: ubuntu-latest
        environment: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            github.event.inputs.environment ||  (github.event.client_payload.ref
            == 'main' && 'staging' || 'development') }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Run Ansible Playbook
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: ansible/deploy.yml
                  key: |
                      ${{ secrets.SSH_PRIVATE_KEY }}
                  inventory: ""
                  options: >-
                      --limit ${{ env.ENVIRONMENT }}  --extra-vars "{
                        \"env_type\": \"${{ env.ENVIRONMENT }}\",
                        \"service_name\": \"${{ env.SERVICE }}\",
                        \"debug\": \"${{ env.ENVIRONMENT == 'development' && 'True' || 'False' }}\",
                        \"domain_name\": \"${{ env.ENVIRONMENT == 'staging' && 'stage-wdoc.pp.ua' || '' }}\",
                        \"dockerhub_user\": \"${{ secrets.DOCKERHUB_USERNAME }}\",
                        \"dockerhub_token\": \"${{ secrets.DOCKERHUB_TOKEN }}\",
                        \"postgres_db\": \"${{ secrets.POSTGRES_DB }}\",
                        \"postgres_user\": \"${{ secrets.POSTGRES_USER }}\",
                        \"postgres_password\": \"${{ secrets.POSTGRES_PASSWORD }}\",
                        \"postgres_host\": \"${{ secrets.POSTGRES_HOST }}\",
                        \"secret_key\": \"${{ secrets.BACKEND_SECRET_KEY }}\",
                        \"frontend_url\": \"${{ secrets.FRONTEND_URL }}\",
                        \"email_host\": \"${{ secrets.EMAIL_HOST }}\",
                        \"email_port\": \"${{ secrets.EMAIL_PORT }}\",
                        \"email_host_user\": \"${{ secrets.EMAIL_HOST_USER }}\",
                        \"email_host_password\": \"${{ secrets.EMAIL_HOST_PASSWORD }}\",
                        \"allowed_hosts\": \"${{ secrets.ALLOWED_HOSTS }}\",
                        \"celery_broker_url\": \"${{ secrets.CELERY_BROKER_URL }}\",
                        \"celery_result_backend\": \"${{ secrets.CELERY_RESULT_BACKEND }}\"
                      }"
