name: deploy

on:
    repository_dispatch:
        types: [ trigger-deploy ]
    workflow_dispatch:
        inputs:
            environment:
                required: true
                type: choice
                options: [ development, staging ]
            service:
                required: true
                type: choice
                options: [ frontend, backend ]
            deploy_mode:
                required: false
                default: update
                type: choice
                options: [ init, update ]

env:
    ENVIRONMENT: >-
        ${{ github.event_name == 'workflow_dispatch' &&
        github.event.inputs.environment ||  (github.event.client_payload.ref ==
        'main' && 'staging' || 'development') }}
    SERVICE: ${{ github.event.inputs.service || github.event.client_payload.service }}
    DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || 'update' }}

concurrency:
    group: deploy-${{ github.event_name == 'workflow_dispatch' &&
        github.event.inputs.environment || (github.event.client_payload.ref ==
        'main' && 'staging' || 'development') }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    terraform-check:
        runs-on: ubuntu-latest
        environment: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            github.event.inputs.environment ||  (github.event.client_payload.ref
            == 'main' && 'staging' || 'development') }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: IaC Security Scan
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  severity: "CRITICAL"
                  exit-code: 1
                  scan-ref: "terraform/environments/${{ env.ENVIRONMENT }}"

    deploy:
        needs: terraform-check
        runs-on: ubuntu-latest
        environment: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            github.event.inputs.environment ||  (github.event.client_payload.ref
            == 'main' && 'staging' || 'development') }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Run Ansible Playbook
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: ansible/deploy.yml
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  inventory: ansible/inventory.ini
                  options: >-
                      --limit ${{ env.ENVIRONMENT }}  --extra-vars "{
                        \"env_type\": \"${{ env.ENVIRONMENT }}\",
                        \"service_name\": \"${{ env.SERVICE }}\",
                        \"deploy_mode\": \"${{ env.DEPLOY_MODE }}\",
                        \"domain_name\": \"${{ env.ENVIRONMENT == 'staging' && 'staging.mydomain.com' || 'dev.mydomain.com' }}\",
                        \"dockerhub_user\": \"${{ secrets.DOCKERHUB_USERNAME }}\",
                        \"dockerhub_token\": \"${{ secrets.DOCKERHUB_TOKEN }}\",
                        \"db_name\": \"${{ secrets.DB_NAME }}\",
                        \"db_user\": \"${{ secrets.DB_USER }}\",
                        \"db_pass\": \"${{ secrets.DB_PASSWORD }}\",
                        \"db_host\": \"${{ secrets.DB_HOST }}\",
                        \"secret_key\": \"${{ secrets.BACKEND_SECRET_KEY }}\",
                        \"api_url\": \"${{ secrets.API_URL }}\",
                        \"allowed_hosts\": \"${{ secrets.ALLOWED_HOSTS }}\"
                      }"
