name: infra-provision

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                default: both
                type: choice
                options:
                    - development
                    - staging
                    - both

jobs:
    provision-development:
        if: ${{ github.event.inputs.environment == 'development' || github.event.inputs.environment == 'both' }}
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment == 'both' && 'development' || github.event.inputs.environment }}

        steps:
            - name: Run Ansible Provision
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: ansible/provision.yml
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  inventory: ansible/inventory.ini
                  options: >
                      --limit development
                      --extra-vars "
                      env_type=development
                      enable_ssl=false
                      domain_name=
                      "

    provision-staging:
        if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'both' }}
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment == 'both' && 'staging' || github.event.inputs.environment }}

        steps:
            - name: Run Ansible Provision
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: ansible/provision.yml
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  inventory: ansible/inventory.ini
                  options: >
                      --limit staging
                      --extra-vars "
                      env_type=staging
                      enable_ssl=true
                      domain_name=staging.mydomain.com
                      "
