project_root: "/home/{{ ansible_user }}/app"
env_type: development
service_name: backend

supported_env_types:
  - development
  - staging

updatable_services:
  - frontend
  - backend
  - celery_worker
  - celery_beat

env_files:
  - { src: "backend.env.j2", dest: "backend.env" }
  - { src: "database.env.j2", dest: "database.env" }
