---
zram_enabled: true

# Memory
vm_swappiness: 10
vm_vfs_cache_pressure: 50
vm_overcommit_memory: 1

# Network
net_core_somaxconn: 65535
tcp_max_syn_backlog: 65535
ip_local_port_range: "1024 65535"
tcp_fin_timeout: 15
tcp_tw_reuse: 1
netdev_max_backlog: 65535

# Limits
nofile_limit: 65535

# Services
unnecessary_services:
  - snapd.service
  - avahi-daemon.service
