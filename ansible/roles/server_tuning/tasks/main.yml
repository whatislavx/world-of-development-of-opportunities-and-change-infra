---
- name: Install zRAM for memory compression
  ansible.builtin.apt:
    name: zram-config
    state: present
    update_cache: yes
  when: zram_enabled | bool

- name: Apply sysctl optimizations for low-resource environments
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: "vm.swappiness", value: "{{ vm_swappiness }}" }
    - { key: "vm.vfs_cache_pressure", value: "{{ vm_vfs_cache_pressure }}" }
    - { key: "vm.overcommit_memory", value: "{{ vm_overcommit_memory }}" }
    - { key: "net.core.somaxconn", value: "{{ net_core_somaxconn }}" }
    - { key: "net.ipv4.tcp_max_syn_backlog", value: "{{ tcp_max_syn_backlog }}" }
    - { key: "net.ipv4.ip_local_port_range", value: "{{ ip_local_port_range }}" }
    - { key: "net.ipv4.tcp_fin_timeout", value: "{{ tcp_fin_timeout }}" }
    - { key: "net.ipv4.tcp_tw_reuse", value: "{{ tcp_tw_reuse }}" }
    - { key: "net.core.netdev_max_backlog", value: "{{ netdev_max_backlog }}" }

- name: Disable Transparent Huge Pages (THP) to reduce latency
  ansible.builtin.shell: |
    echo never > /sys/kernel/mm/transparent_hugepage/enabled
    echo never > /sys/kernel/mm/transparent_hugepage/defrag
  args:
    executable: /bin/bash
  register: thp_disable
  changed_when: false
  ignore_errors: true

- name: Mask and disable unnecessary background services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
    masked: yes
  loop: "{{ unnecessary_services }}"
  ignore_errors: true

- name: Stop and disable apt-daily timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

- name: Set system limits for open files
  community.general.pam_limits:
    domain: "*"
    limit_type: "{{ item }}"
    limit_item: nofile
    value: "{{ nofile_limit }}"
  loop: [ "soft", "hard" ]
