- name: Install dependencies and Docker
  block:
    - name: Install base dependencies
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present
        update_cache: yes

    - name: Setup Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} {{ docker_apt_release_channel }}"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

    - name: Manage Docker service and users
      block:
        - name: Ensure Docker service is enabled and running
          ansible.builtin.service:
            name: docker
            state: started
            enabled: yes

        - name: Add Ansible user to docker group
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: yes

    - name: Create project directory
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"
