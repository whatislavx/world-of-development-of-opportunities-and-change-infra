version: '3.8'

services:
  frontend:
    image: whatislavx/wdoc-frontend:latest
    container_name: wdoc-frontend-development
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wdoc-network

  backend:
    image: whatislavx/wdoc-backend:latest
    container_name: wdoc-backend-development
    env_file: backend.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wdoc-network

  db:
    image: postgres:15-alpine
    container_name: wdoc-db
    restart: always
    env_file: database.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wdoc-network

  redis:
    image: redis:alpine
    container_name: wdoc-redis-development
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wdoc-network

  celery_worker:
    image: whatislavx/wdoc-backend:latest
    container_name: celery_worker_development
    command: celery -A app.celery_app worker --loglevel=info
    env_file: backend.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - wdoc-network

  celery_beat:
    image: whatislavx/wdoc-backend:latest
    container_name: celery_beat_development
    command: celery -A app.celery_app beat --loglevel=info
    env_file: backend.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    networks:
      - wdoc-network

  nginx:
    image: nginx:stable-alpine
    container_name: wdoc-nginx-development
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-development.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - wdoc-network

networks:
  wdoc-network:
    driver: bridge

volumes:
  postgres_data: