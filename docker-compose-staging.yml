services:
  frontend:
    image: whatislavx/wdoc-frontend:latest
    container_name: wdoc-frontend-staging
    env_file: frontend.env
    depends_on:
      - backend
    restart: always
    networks:
      - wdoc-network

  backend:
    image: whatislavx/wdoc-backend:latest
    container_name: wdoc-backend-staging
    env_file: backend.env
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - wdoc-network

  nginx:
    image: nginx:stable-alpine
    container_name: wdoc-nginx-staging
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wdoc-network

  redis:
    image: redis:alpine
    container_name: wdoc-redis-staging
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wdoc-network

  celery_beat:
    image: whatislavx/wdoc-backend:latest
    container_name: celery_beat_staging
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    networks:
      - wdoc-network

  celery_worker:
    image: whatislavx/wdoc-backend:latest
    container_name: celery_worker_staging
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - wdoc-network

networks:
  wdoc-network:
    driver: bridge