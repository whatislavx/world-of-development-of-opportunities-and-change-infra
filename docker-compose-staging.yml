services:
  frontend:
    image: whatislavx/wdoc-frontend:latest
    container_name: wdoc-frontend-staging
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - wdoc-network

  backend:
    image: whatislavx/wdoc-backend:latest
    container_name: wdoc-backend-staging
    env_file: backend.env
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wdoc-network

  nginx:
    image: nginx:stable-alpine
    container_name: wdoc-nginx-staging
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - wdoc-network

  redis:
    image: redis:alpine
    container_name: wdoc-redis-staging
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wdoc-network

  celery:
    image: whatislavx/wdoc-backend:latest
    container_name: celery_staging
    entrypoint: ["/bin/sh", "-c"]
    command: celery -A config worker --loglevel=info
    env_file: backend.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - wdoc-network

networks:
  wdoc-network:
    driver: bridge