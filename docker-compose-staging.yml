services:
  frontend:
    image: whatislavx/wdoc-frontend:latest
    container_name: wdoc-frontend-staging
    env_file: frontend.env
    depends_on:
      - backend
    restart: always
    networks:
      - wdoc-network

  backend:
    image: whatislavx/wdoc-backend:latest
    container_name: wdoc-backend-staging
    env_file: backend.env
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - wdoc-network



  nginx:
    image: nginx:stable-alpine
    container_name: wdoc-nginx-staging
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wdoc-network

networks:
  wdoc-network:
    driver: bridge

